kind: ConfigMap
apiVersion: v1
metadata:
  name: ldap-bootstrap
  namespace: openldap
immutable: false
data:
  01-init.ldif: |-
    # Users OU

    dn: ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: organizationalUnit
    ou: users

    # Groups OU

    dn: ou=groups,dc=expertlabs,dc=ibm,dc=com
    objectClass: organizationalUnit
    ou: groups

    # Users

    dn: uid=cp4baadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: inetOrgPerson
    cn: CP4BA Admin
    sn: Admin
    uid: cp4baadmin
    mail: cp4baadmin@expertlabs.ibm.com
    userPassword: passw0rd

    dn: uid=bawadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: inetOrgPerson
    cn: BAW Admin
    sn: Admin
    uid: bawadmin
    mail: bawadmin@expertlabs.ibm.com
    userPassword: passw0rd

    dn: uid=banadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: inetOrgPerson
    cn: BAN Admin
    sn: Admin
    uid: banadmin
    mail: banadmin@expertlabs.ibm.com
    userPassword: passw0rd

    dn: uid=fnadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: inetOrgPerson
    cn: FN Admin
    sn: Admin
    uid: fnadmin
    mail: fnadmin@expertlabs.ibm.com
    userPassword: passw0rd

    # Group: cp4ba-admins

    dn: cn=cp4ba-admins,ou=groups,dc=expertlabs,dc=ibm,dc=com
    objectClass: groupOfNames
    cn: cp4ba-admins
    member: uid=ldapadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=cp4baadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=bawadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=banadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=fnadmin,ou=users,dc=expertlabs,dc=ibm,dc=com

    # Group: odm-admins

    dn: cn=odm-admins,ou=groups,dc=expertlabs,dc=ibm,dc=com
    objectClass: groupOfNames
    cn: odm-admins
    member: uid=ldapadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=cp4baadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=bawadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=banadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=fnadmin,ou=users,dc=expertlabs,dc=ibm,dc=com

    # Group: fnwf-admins

    dn: cn=fnwf-admins,ou=groups,dc=expertlabs,dc=ibm,dc=com
    objectClass: groupOfNames
    cn: fnwf-admins
    member: uid=ldapadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=cp4baadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=bawadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=banadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=fnadmin,ou=users,dc=expertlabs,dc=ibm,dc=com

    # Group: fnwfcfg-admins

    dn: cn=fnwfcfg-admins,ou=groups,dc=expertlabs,dc=ibm,dc=com
    objectClass: groupOfNames
    cn: fnwfcfg-admins
    member: uid=ldapadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=cp4baadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=bawadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=banadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: uid=fnadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
