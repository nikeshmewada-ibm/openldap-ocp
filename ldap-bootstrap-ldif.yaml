kind: ConfigMap
apiVersion: v1
metadata:
  name: ldap-bootstrap
  namespace: openldap
immutable: false
data:
  01-init.ldif: |-
    # Users OU

    dn: ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: organizationalUnit
    ou: users

    # Groups OU

    dn: ou=groups,dc=expertlabs,dc=ibm,dc=com
    objectClass: organizationalUnit
    ou: groups

    # Users

    dn: cn=cp4baadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: inetOrgPerson
    objectClass: person
    cn: cp4baadmin
    sn: Admin
    uid: cp4baadmin
    mail: cp4baadmin@expertlabs.ibm.com
    userPassword: passw0rd

    dn: cn=bawadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: inetOrgPerson
    objectClass: person
    cn: bawadmin
    sn: Admin
    uid: bawadmin
    mail: bawadmin@expertlabs.ibm.com
    userPassword: passw0rd

    dn: cn=banadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: inetOrgPerson
    objectClass: person
    cn: banadmin
    sn: Admin
    uid: banadmin
    mail: banadmin@expertlabs.ibm.com
    userPassword: passw0rd

    dn: cn=fnadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: inetOrgPerson
    objectClass: person
    cn: fnadmin
    sn: Admin
    uid: fnadmin
    mail: fnadmin@expertlabs.ibm.com
    userPassword: passw0rd

    dn: cn=odmadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    objectClass: inetOrgPerson
    objectClass: person
    cn: odmadmin
    sn: Admin
    uid: odmadmin
    mail: odmadmin@expertlabs.ibm.com
    userPassword: passw0rd

    # Group: cp4ba_admins

    dn: cn=cp4ba_admins,ou=groups,dc=expertlabs,dc=ibm,dc=com
    objectClass: groupOfNames
    cn: cp4ba_admins
    member: cn=cp4baadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=bawadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=banadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=fnadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=odmadmin,ou=users,dc=expertlabs,dc=ibm,dc=com

    # Group: odm_admins

    dn: cn=odm_admins,ou=groups,dc=expertlabs,dc=ibm,dc=com
    objectClass: groupOfNames
    cn: odm_admins
    member: cn=cp4baadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=bawadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=banadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=fnadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=odmadmin,ou=users,dc=expertlabs,dc=ibm,dc=com

    # Group: fnwf_admins

    dn: cn=fnwf_admins,ou=groups,dc=expertlabs,dc=ibm,dc=com
    objectClass: groupOfNames
    cn: fnwf_admins
    member: cn=cp4baadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=bawadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=banadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=fnadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=odmadmin,ou=users,dc=expertlabs,dc=ibm,dc=com

    # Group: fnwfcfg_admins

    dn: cn=fnwfcfg_admins,ou=groups,dc=expertlabs,dc=ibm,dc=com
    objectClass: groupOfNames
    cn: fnwfcfg_admins
    member: cn=cp4baadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=bawadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=banadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=fnadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
    member: cn=odmadmin,ou=users,dc=expertlabs,dc=ibm,dc=com
